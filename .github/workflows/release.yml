name: Release

# Publishes a GitHub Release when a version tag is pushed.
# Enable Zenodo–GitHub integration at https://zenodo.org/account/settings/github/
# and select this repository; Zenodo will archive each published release automatically.

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    env:
      PYTHONPATH: src
      MPLBACKEND: Agg
      ENABLE_RRT_ANIMATION: "false"

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ runner.os }}-py312-${{ hashFiles('package.json', 'requirements-dev.txt') }}
          restore-keys: |
            pip-${{ runner.os }}-py312-

      - name: Install project dependencies
        run: python scripts/install_dependencies.py

      - name: Install development tools
        run: python -m pip install -r requirements-dev.txt

      - name: Run tests
        run: |
          python -m pytest tests/unit \
            --cov=utils \
            --cov-fail-under=80

  publish:
    needs: verify
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
